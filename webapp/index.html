<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Film</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2035;
            --bg-card-hover: #1f2847;
            --accent: #625df5;
            --accent-light: #818cf8;
            --accent-glow: rgba(98, 93, 245, 0.25);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --favorite: #ff3b30;
            --radius: 14px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-height: 58px;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            position: relative;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 12px 16px 8px;
            flex-shrink: 0;
            background: linear-gradient(to bottom, var(--bg-primary), rgba(10, 14, 26, 0.8));
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            color: var(--accent-light);
        }

        .header-title {
            font-size: 19px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        /* ===== SEARCH ===== */
        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13.5px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            background: var(--bg-card);
        }

        /* ===== CONTENT AREA ===== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 4px 14px calc(var(--nav-height) + 15px + var(--safe-bottom));
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        .list-container {
            display: none;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        .list-container.active {
            display: flex;
        }

        /* ===== MOVIE CARD ===== */
        .movie-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s ease;
        }

        .movie-card:active {
            transform: scale(0.985);
            background: var(--bg-card-hover);
        }

        .movie-info {
            flex: 1;
            min-width: 0;
        }

        .movie-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 3px;
        }

        .movie-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .meta-icon {
            width: 11px;
            height: 11px;
        }

        /* ===== ACTION BUTTONS ===== */
        .card-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fav-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .fav-btn svg {
            width: 18px;
            height: 18px;
        }

        .fav-btn.active {
            color: var(--favorite);
            background: rgba(255, 59, 48, 0.12);
            border-color: rgba(255, 59, 48, 0.25);
        }

        .fav-btn.active svg {
            fill: var(--favorite);
            stroke: var(--favorite);
        }

        /* DAXSHAT OLISH BUTTON */
        .get-btn {
            height: 38px;
            padding: 0 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, #625df5, #4f46e5);
            color: #fff;
            border: none;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: all 0.2s ease;
        }

        .get-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .get-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .get-btn svg {
            width: 14px;
            height: 14px;
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(var(--nav-height) + var(--safe-bottom));
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(25px);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 0 25px var(--safe-bottom);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .nav-item.active {
            color: var(--accent-light);
        }

        .nav-icon {
            width: 22px;
            height: 22px;
            transition: transform 0.2s ease;
        }

        .nav-item.active .nav-icon {
            transform: translateY(-1px);
        }

        .toast {
            position: fixed;
            bottom: calc(var(--nav-height) + 15px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: rgba(30, 41, 59, 1);
            border: 1px solid var(--border);
            color: #fff;
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== ADMIN PANEL STYLES ===== */
        .admin-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .admin-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        .admin-card-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .admin-input:focus {
            border-color: var(--accent);
        }

        .admin-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .admin-btn:active {
            opacity: 0.8;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .movie-manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .movie-manage-item:last-child {
            border-bottom: none;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header" id="appHeader">
            <div class="header-top">
                <div class="header-title-container">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M22 12s-3 7-10 7-10-7-10-7 3-7 10-7 10 7 10 7z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <span class="header-title" id="pageTitle">Nova Film</span>
                </div>
            </div>
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                    <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
                </svg>
                <input class="search-input" type="text" id="searchInput" placeholder="Kino qidirish..." autocomplete="off">
            </div>
        </div>

        <!-- Main Content (Dual List) -->
        <div class="main-content">
            <!-- Asosiy ro'yxat -->
            <div id="homeList" class="list-container active"></div>
            
            <!-- Sevimlilar ro'yxati -->
            <div id="favsList" class="list-container">
                <div id="emptyFavs" style="display:none; flex-direction:column; align-items:center; justify-content:center; padding:70px 30px; text-align:center; gap:12px;">
                    <svg style="width:50px; height:50px; color:var(--text-muted); opacity:0.3;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 21l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.18L12 21z"/>
                    </svg>
                    <div style="font-size:14px; color:var(--text-secondary); font-weight:500;">Tanlanganlar bo'sh ✨</div>
                </div>
                <div id="favsContent" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>

            <!-- Admin Panel -->
            <div id="adminList" class="list-container">
                <div class="admin-section">
                    <!-- Statistika -->
                    <div class="admin-card">
                        <div class="admin-card-title">
                            <svg style="width:16px; height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3v18h18"/><path d="M18 17l-6-6-4 4-5-5"/></svg>
                            Statistika
                        </div>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-value" id="statTotalUsers">...</div>
                                <div class="stat-label">Foydalanuvchilar</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="statTotalMovies">...</div>
                                <div class="stat-label">Kinolar</div>
                            </div>
                        </div>
                    </div>

                    <!-- Kino Qo'shish -->
                    <div class="admin-card">
                        <div class="admin-card-title">
                            <svg style="width:16px; height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                            Kino Qo'shish
                        </div>
                        <div class="admin-form">
                            <div class="form-group">
                                <label class="form-label">Kino Kodi</label>
                                <input type="text" id="addMovieCode" class="admin-input" placeholder="Masalan: 123">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Kino Nomi</label>
                                <input type="text" id="addMovieTitle" class="admin-input" placeholder="Masalan: Forsaj 10">
                            </div>
                            <button class="admin-btn" onclick="addMovie()">Qo'shish</button>
                        </div>
                    </div>

                    <!-- Boshqarish -->
                    <div class="admin-card">
                        <div class="admin-card-title">
                            <svg style="width:16px; height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                            Kinolar Boshqaruvi
                        </div>
                        <div id="adminMoviesList"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active" id="navHome" onclick="switchTab('home')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Asosiy</span>
            </div>
            <div class="nav-item" id="navFavs" onclick="switchTab('favs')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                </svg>
                <span>Sevimlilar</span>
            </div>
            <div class="nav-item" id="navAdmin" onclick="switchTab('admin')" style="display: none;">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 11c2.209 0 4-1.791 4-4s-1.791-4-4-4-4 1.791-4 4 1.791 4 4 4zM12 13c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span>Admin</span>
            </div>
        </nav>

        <div class="toast" id="toast">
            <span id="toastText">Kod nusxalandi!</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const homeList = document.getElementById('homeList');
        const favsList = document.getElementById('favsList');
        const adminList = document.getElementById('adminList');
        const favsContent = document.getElementById('favsContent');
        const emptyFavs = document.getElementById('emptyFavs');
        const searchInput = document.getElementById('searchInput');
        const pageTitle = document.getElementById('pageTitle');
        const navAdmin = document.getElementById('navAdmin');
        const adminMoviesList = document.getElementById('adminMoviesList');
        
        let allMovies = [];
        let favorites = JSON.parse(localStorage.getItem('fav_movies') || '[]');
        let currentTab = 'home';
        let isAdmin = false;
        const userId = tg.initDataUnsafe?.user?.id;

        const filmIcon = `<svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 8h20M2 16h20M8 4v16M16 4v16"/></svg>`;
        const codeIcon = `<svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`;
        const sendIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>`;
        const heartIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`;

        async function fetchMovies() {
            try {
                const response = await fetch('/api/movies');
                allMovies = await response.json();
                renderAll();
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function switchTab(tab) {
            if (currentTab === tab) return;
            currentTab = tab;
            
            document.getElementById('navHome').classList.toggle('active', tab === 'home');
            document.getElementById('navFavs').classList.toggle('active', tab === 'favs');
            document.getElementById('navAdmin').classList.toggle('active', tab === 'admin');
            
            if (tab === 'favs') {
                pageTitle.textContent = "Sevimlilar";
                document.querySelector('.search-wrapper').style.opacity = "0";
                document.querySelector('.search-wrapper').style.pointerEvents = "none";
                homeList.classList.remove('active');
                adminList.classList.remove('active');
                favsList.classList.add('active');
                renderFavs();
            } else if (tab === 'admin') {
                pageTitle.textContent = "Admin Panel";
                document.querySelector('.search-wrapper').style.opacity = "0";
                document.querySelector('.search-wrapper').style.pointerEvents = "none";
                homeList.classList.remove('active');
                favsList.classList.remove('active');
                adminList.classList.add('active');
                loadAdminData();
            } else {
                pageTitle.textContent = "Nova Film";
                document.querySelector('.search-wrapper').style.opacity = "1";
                document.querySelector('.search-wrapper').style.pointerEvents = "auto";
                favsList.classList.remove('active');
                adminList.classList.remove('active');
                homeList.classList.add('active');
            }
        }

        async function checkAdmin() {
            if (!userId) return;
            try {
                const res = await fetch(`/api/is_admin?id=${userId}`);
                const data = await res.json();
                if (data.is_admin) {
                    isAdmin = true;
                    navAdmin.style.display = 'flex';
                }
            } catch (e) {
                console.error("Admin check failed", e);
            }
        }

        async function loadAdminData() {
            if (!isAdmin) return;
            
            // Load stats
            try {
                const res = await fetch(`/api/stats?id=${userId}`);
                const data = await res.json();
                document.getElementById('statTotalUsers').textContent = data.total_users;
                document.getElementById('statTotalMovies').textContent = data.total_videos;
            } catch (e) {}

            // Render movie management list
            adminMoviesList.innerHTML = '';
            allMovies.forEach(movie => {
                const item = document.createElement('div');
                item.className = 'movie-manage-item';
                item.innerHTML = `
                    <div style="font-size:12px; font-weight:600;">
                        ${movie.title} <span style="color:var(--text-muted); font-weight:400;">(${movie.code})</span>
                    </div>
                    <button class="delete-btn" onclick="deleteMovie('${movie.code}')">O'chirish</button>
                `;
                adminMoviesList.appendChild(item);
            });
        }

        async function addMovie() {
            const code = document.getElementById('addMovieCode').value;
            const title = document.getElementById('addMovieTitle').value;
            
            if (!code || !title) {
                tg.showAlert("Barcha maydonlarni to'ldiring!");
                return;
            }

            try {
                const res = await fetch('/api/add_movie', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_id: userId, code, title })
                });
                const data = await res.json();
                if (data.success) {
                    showToast("Kino qo'shildi! ✅");
                    document.getElementById('addMovieCode').value = '';
                    document.getElementById('addMovieTitle').value = '';
                    fetchMovies(); // Reload list
                    setTimeout(loadAdminData, 500);
                } else {
                    tg.showAlert(data.error || "Xatolik yuz berdi");
                }
            } catch (e) {
                tg.showAlert("Xatolik yuz berdi");
            }
        }

        async function deleteMovie(code) {
            if (!confirm(`Haqiqatan ham ${code} kodli kinoni o'chirmoqchimisiz?`)) return;

            try {
                const res = await fetch('/api/delete_movie', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_id: userId, code })
                });
                const data = await res.json();
                if (data.success) {
                    showToast("Kino o'chirildi! 🗑");
                    fetchMovies(); // Reload list
                    setTimeout(loadAdminData, 500);
                }
            } catch (e) {
                tg.showAlert("Xatolik yuz berdi");
            }
        }

        function toggleFavorite(id, btnElement) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
                if (btnElement) btnElement.classList.remove('active');
                if (currentTab === 'favs') renderFavs();
                // Update corresponding button in home list if it exists
                const mainBtn = homeList.querySelector(`.fav-btn[data-code="${id}"]`);
                if (mainBtn) mainBtn.classList.remove('active');
            } else {
                favorites.push(id);
                if (btnElement) btnElement.classList.add('active');
                tg.HapticFeedback.impactOccurred('medium');
                // Update corresponding button in home list if it exists
                const mainBtn = homeList.querySelector(`.fav-btn[data-code="${id}"]`);
                if (mainBtn) mainBtn.classList.add('active');
            }
            localStorage.setItem('fav_movies', JSON.stringify(favorites));
        }

        async function sendCode(code) {
            try {
                await navigator.clipboard.writeText(code);
                showToast('Kod nusxalandi! ✍️ ( ' + code + ' )');
                tg.HapticFeedback.notificationOccurred('success');
            } catch (err) {
                showToast('Xatolik yuz berdi');
            }
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function createCard(movie) {
            const isFav = favorites.includes(movie.code.toString());
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <div class="movie-info">
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-meta">
                        <span class="meta-item">${filmIcon} HD 1080p</span>
                        <span class="meta-item">${codeIcon} Kod: ${movie.code}</span>
                    </div>
                </div>
                <div class="card-actions">
                    <div class="fav-btn ${isFav ? 'active' : ''}" data-code="${movie.code}" onclick="event.stopPropagation(); toggleFavorite('${movie.code}', this)">
                        ${heartIcon}
                    </div>
                    <button class="get-btn" onclick="event.stopPropagation(); sendCode('${movie.code}')">
                        ${sendIcon} OLISH
                    </button>
                </div>
            `;
            card.onclick = () => sendCode(movie.code);
            return card;
        }

        function renderAll() {
            homeList.innerHTML = '';
            const query = searchInput.value.toLowerCase().trim();
            const moviesToShow = query ? allMovies.filter(m => m.title.toLowerCase().includes(query) || m.code.toString().includes(query)) : allMovies;
            
            moviesToShow.forEach(movie => {
                homeList.appendChild(createCard(movie));
            });
        }

        function renderFavs() {
            favsContent.innerHTML = '';
            const favMovies = allMovies.filter(m => favorites.includes(m.code.toString()));
            
            if (favMovies.length === 0) {
                emptyFavs.style.display = 'flex';
            } else {
                emptyFavs.style.display = 'none';
                favMovies.forEach(movie => {
                    favsContent.appendChild(createCard(movie));
                });
            }
        }

        searchInput.addEventListener('input', renderAll);
        fetchMovies();
        checkAdmin();
    </script>
</body>
</html>
