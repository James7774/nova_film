<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova Film - Kinolar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
            padding-top: 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            position: sticky;
            top: 10px;
            z-index: 100;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
            transform: translateY(-1px);
        }

        .movie-list {
            display: grid;
            gap: 12px;
        }

        .movie-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            cursor: pointer;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .movie-card:active {
            transform: scale(0.98);
            background: rgba(56, 189, 248, 0.1);
        }

        .movie-info {
            flex: 1;
        }

        .movie-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-code {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .copy-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 12px;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loader-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nova Film</h1>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Kino nomini yozing..." autocomplete="off">
        </div>

        <div id="loader" class="loader">
            <div class="loader-spinner"></div>
        </div>

        <div id="movieList" class="movie-list">
            <!-- Kinolar shu yerga tushadi -->
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            Kino topilmadi 😕
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const searchInput = document.getElementById('searchInput');
        const movieList = document.getElementById('movieList');
        const loader = document.getElementById('loader');
        const emptyState = document.getElementById('emptyState');

        let allMovies = [];

        // API'dan kinolarni olish
        async function fetchMovies() {
            loader.style.display = 'block';
            try {
                const response = await fetch('/api/movies');
                const data = await response.json();
                allMovies = data;
                renderMovies(allMovies);
            } catch (error) {
                console.error('Xatolik:', error);
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderMovies(movies) {
            movieList.innerHTML = '';
            if (movies.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-code">Kod: ${movie.code}</div>
                    </div>
                    <button class="copy-btn">YUBORISH</button>
                `;
                card.onclick = () => sendCode(movie.code);
                movieList.appendChild(card);
            });
        }

        function sendCode(code) {
            tg.sendData(code);
            tg.close();
        }

        // Qidiruv funksiyasi
        searchInput.oninput = (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allMovies.filter(m => 
                m.title.toLowerCase().includes(query) || 
                m.code.toString().includes(query)
            );
            renderMovies(filtered);
        };

        fetchMovies();
    </script>
</body>
</html>
